name: Run Python scripts from src

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  run-src-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          set -euo pipefail
          umask 177
          printf '%s' "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Run all Python scripts from src
        env:
          GOOGLE_CREDS_PATH: credentials.json
        run: |
          set -euo pipefail
          mapfile -t scripts < <(find src -maxdepth 1 -type f -name '*.py' | sort)

          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No Python scripts found in src/."
            exit 1
          fi

          for script in "${scripts[@]}"; do
            echo "Running ${script}"
            python "${script}"
          done

      - name: Remove credentials file
        if: always()
        run: |
          rm -f credentials.json
