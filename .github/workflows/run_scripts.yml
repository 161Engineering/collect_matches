name: Run Python scripts from src

on:
  # Keep push trigger for direct branch updates and backward compatibility.
  push:
    branches:
      - main
      - master
  # pull_request trigger is required so test-result comments are posted during PR checks.
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  issues: write

jobs:
  run-src-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install pytest-cov

      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          set -euo pipefail
          umask 177
          printf '%s' "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Run all main project scripts
        env:
          GOOGLE_CREDS_PATH: credentials.json
        run: |
          set -euo pipefail
          # Script-run step: smoke-test repository entry points with safe mocks.
          # This keeps CI deterministic and avoids changing real files or Google Sheets.
          python - <<'PY'
          from unittest.mock import patch

          import collect_matches
          import export_to_sheets
          import run

          print("Smoke: run.py")
          with patch("run.ensure_project_dirs", return_value=None), \
               patch("run.collect_matches", return_value=None), \
               patch("run.export_to_sheets", return_value=0):
              assert run.main() == 0

          print("Smoke: collect_matches.py")
          with patch("collect_matches.main", return_value=None) as collect_main:
              collect_matches.collect_matches()
              collect_main.assert_called_once_with()

          print("Smoke: export_to_sheets.py")
          with patch("export_to_sheets.main", return_value=0) as export_main:
              assert export_to_sheets.export_to_sheets() == 0
              export_main.assert_called_once_with()

          print("Smoke tests for run.py, collect_matches.py, export_to_sheets.py passed.")
          PY

      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          set +e
          # Test step: run all pytest tests, including run/collect/export test modules.
          pytest tests/ 2>&1 | tee pytest-tests.log
          test_exit_code=$?
          echo "exit_code=${test_exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run coverage
        id: run_coverage
        if: steps.run_tests.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          set +e
          # Coverage step: generate XML + terminal + HTML reports for CI analysis and downloads.
          pytest tests/ --cov=./ --cov-report=xml --cov-report=term --cov-report=html 2>&1 | tee pytest-coverage.log
          coverage_exit_code=$?
          echo "exit_code=${coverage_exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Artifact step: publish coverage outputs for download from the Actions run.
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

      - name: Upload test log artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Artifact step: publish pytest logs (when available) for debugging failed runs.
          name: test-results
          path: |
            pytest-tests.log
            pytest-coverage.log
          if-no-files-found: warn

      - name: Check coverage threshold
        id: coverage_gate
        if: steps.run_tests.outputs.exit_code == '0' && steps.run_coverage.outputs.exit_code == '0'
        continue-on-error: true
        run: |
          set +e
          # Coverage check step: parse coverage.xml and enforce minimum 80% total coverage.
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          output_path = os.environ["GITHUB_OUTPUT"]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          coverage_file = "coverage.xml"

          coverage_pct = 0.0
          message = "❌ Coverage below 80%"
          coverage_ok = "false"

          try:
            if not os.path.exists(coverage_file):
              raise FileNotFoundError("coverage.xml not found")

            root = ET.parse(coverage_file).getroot()
            line_rate = float(root.attrib.get("line-rate", "0"))
            coverage_pct = round(line_rate * 100, 2)

            if coverage_pct >= 80.0:
              message = "✅ Coverage acceptable"
              coverage_ok = "true"
          except Exception:
            coverage_pct = 0.0
            message = "❌ Coverage below 80%"
            coverage_ok = "false"

          print(f"{message} ({coverage_pct}%)")

          with open(output_path, "a", encoding="utf-8") as fh:
            fh.write(f"coverage_pct={coverage_pct}\n")
            fh.write(f"coverage_ok={coverage_ok}\n")
            fh.write(f"coverage_message={message}\n")

          if summary_path:
            with open(summary_path, "a", encoding="utf-8") as fh:
              fh.write(f"{message} ({coverage_pct}%)\n")

          if coverage_ok != "true":
            raise SystemExit(1)
          PY
          exit 0

      - name: Comment test result in PR
        if: always()
        uses: actions/github-script@v6
        env:
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          COVERAGE_EXIT_CODE: ${{ steps.run_coverage.outputs.exit_code }}
          COVERAGE_OK: ${{ steps.coverage_gate.outputs.coverage_ok }}
          COVERAGE_MESSAGE: ${{ steps.coverage_gate.outputs.coverage_message }}
          COVERAGE_PCT: ${{ steps.coverage_gate.outputs.coverage_pct }}
        with:
          script: |
            // Notification step: posts test and coverage status to the related Pull Request when available.
            const testExitCode = Number(process.env.TEST_EXIT_CODE ?? '1');
            const coverageExitCode = Number(process.env.COVERAGE_EXIT_CODE ?? '0');
            const coverageOk = (process.env.COVERAGE_OK ?? '').toLowerCase() === 'true';
            const coveragePct = process.env.COVERAGE_PCT ?? '';

            const testsFailed = testExitCode !== 0;
            const coverageFailed = testExitCode === 0 && (coverageExitCode !== 0 || !coverageOk);

            const testsMessage = testsFailed ? '❌ Some tests failed' : '✅ All tests passed';
            const defaultCoverageMessage = coverageFailed ? '❌ Coverage below 80%' : '✅ Coverage acceptable';
            const coverageMessageBase = process.env.COVERAGE_MESSAGE || defaultCoverageMessage;
            const coverageMessage = coveragePct ? `${coverageMessageBase} (${coveragePct}%)` : coverageMessageBase;
            const body = `${testsMessage}\n${coverageMessage}`;

            let prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });

              if (associated.data.length > 0) {
                prNumber = associated.data[0].number;
              }
            }

            if (!prNumber) {
              core.info('No related Pull Request found. Skipping PR comment.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Notify test success
        if: steps.run_tests.outputs.exit_code == '0' && steps.run_coverage.outputs.exit_code == '0' && steps.coverage_gate.outputs.coverage_ok == 'true'
        run: |
          # Notification step: makes successful test status obvious in logs and summary.
          echo "✅ All tests passed"
          echo "✅ All tests passed" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify test failure
        if: steps.run_tests.outputs.exit_code != '0' || (steps.run_tests.outputs.exit_code == '0' && (steps.run_coverage.outputs.exit_code != '0' || steps.coverage_gate.outputs.coverage_ok != 'true'))
        run: |
          # Notification step: reports failed tests in logs and summary.
          echo "❌ Some tests failed"
          echo "❌ Some tests failed" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify coverage failure
        if: steps.run_tests.outputs.exit_code == '0' && (steps.run_coverage.outputs.exit_code != '0' || steps.coverage_gate.outputs.coverage_ok != 'true')
        run: |
          # Coverage notification step: reports insufficient coverage threshold.
          echo "❌ Coverage below 80%"
          echo "❌ Coverage below 80%" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow on test failure
        if: steps.run_tests.outputs.exit_code != '0' || (steps.run_tests.outputs.exit_code == '0' && (steps.run_coverage.outputs.exit_code != '0' || steps.coverage_gate.outputs.coverage_ok != 'true'))
        run: |
          # This step enforces a failing CI status when tests or coverage generation fail.
          exit 1

      - name: Remove credentials file
        if: always()
        run: |
          rm -f credentials.json
