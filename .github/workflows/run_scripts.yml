name: Run Production Pipeline

on:
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-production-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          set -euo pipefail
          umask 177
          printf '%s' "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Run production pipeline
        id: run_pipeline
        env:
          GOOGLE_CREDS_PATH: credentials.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SITE_CALENDAR_URL: ${{ secrets.SITE_CALENDAR_URL }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
          # run.py reads Telegram settings and sends started/success/failure notifications.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_CUSTOMERS: ${{ secrets.TELEGRAM_CHAT_ID_CUSTOMERS }}
        run: |
          # Production-only execution: run.py sends Telegram notifications
          # based strictly on its own real exit code.
          set +e
          xvfb-run -a python run.py
          pipeline_exit_code=$?
          output_files_count=$(find ci_output -type f 2>/dev/null | wc -l)

          echo "exit_code=${pipeline_exit_code}" >> "$GITHUB_OUTPUT"
          echo "output_files_count=${output_files_count}" >> "$GITHUB_OUTPUT"

          echo "PIPELINE SUMMARY"
          echo "----------------"
          echo "run.py exit code: ${pipeline_exit_code}"
          echo "files generated in ci_output: ${output_files_count}"

          {
            echo "PIPELINE SUMMARY"
            echo "----------------"
            echo "run.py exit code: ${pipeline_exit_code}"
            echo "files generated in ci_output: ${output_files_count}"
          } >> "$GITHUB_STEP_SUMMARY"

          exit ${pipeline_exit_code}

      - name: Upload production artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-artifacts
          path: |
            ci_output/**
            data/**
            !credentials.json
            !**/credentials.json
          retention-days: 7
          if-no-files-found: warn

      - name: Remove credentials file
        if: always()
        run: |
          rm -f credentials.json
