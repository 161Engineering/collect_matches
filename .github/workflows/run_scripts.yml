name: Run Python scripts from src

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  run-src-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          set -euo pipefail
          umask 177
          printf '%s' "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Run all Python scripts from src
        env:
          GOOGLE_CREDS_PATH: credentials.json
        run: |
          set -euo pipefail
          # This step validates that all runnable scripts in src/ execute in CI.
          mapfile -t scripts < <(find src -maxdepth 1 -type f -name '*.py' | sort)

          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No Python scripts found in src/."
            exit 1
          fi

          for script in "${scripts[@]}"; do
            echo "Running ${script}"
            python "${script}"
          done

      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          set -euo pipefail
          # This step verifies script behavior with automated tests.
          pytest tests/

      - name: Notify test success
        if: steps.run_tests.outcome == 'success'
        run: |
          # Notification step: makes successful test status obvious in logs and summary.
          echo "✅ All tests passed"
          echo "✅ All tests passed" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify test failure
        if: steps.run_tests.outcome == 'failure'
        run: |
          # Notification step: reports failed tests and fails the job explicitly.
          echo "❌ Some tests failed"
          echo "❌ Some tests failed" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Remove credentials file
        if: always()
        run: |
          rm -f credentials.json
